apiVersion: 1

groups:
  - orgId: 1
    name: bruteforce-checks
    folder: General  # This is the key fix!
    interval: 1m
    rules:
      - uid: ssh-bruteforce
        title: SSH Bruteforce Detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: postgresql
            model:
              rawSql: "SELECT COUNT(*) as attempt_count FROM events WHERE event_type = 'authentication' AND timestamp > now() - interval '5 minutes' GROUP BY source_ip HAVING COUNT(*) > 3"
              format: table
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              type: reduce
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              expression: B
              type: threshold
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: critical
