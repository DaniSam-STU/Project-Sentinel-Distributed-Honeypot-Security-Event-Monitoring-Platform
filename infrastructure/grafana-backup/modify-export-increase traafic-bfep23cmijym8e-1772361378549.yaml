apiVersion: 1
groups:
    - orgId: 1
      name: increase traafic
      folder: unusual traffic
      interval: 5m
      rules:
        - uid: bfep23cmijym8e
          title: Unusual Traffic Spike
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: dfeotjrrru2o0b
              model:
                dataset: sentinel
                editorMode: code
                format: table
                intervalMs: 1000
                maxDataPoints: 43200
                rawQuery: true
                rawSql: |-
                    SELECT COUNT(*) as current_rate
                    FROM events
                    WHERE timestamp > NOW() - INTERVAL '5 minutes'

                    -- Query B: Baseline from last hour
                    SELECT AVG(count) as baseline_rate
                    FROM (
                      SELECT COUNT(*) as count
                      FROM events
                      WHERE timestamp > NOW() - INTERVAL '1 hour'
                        AND timestamp < NOW() - INTERVAL '5 minutes'
                      GROUP BY time_bucket('5 minutes', timestamp)
                    ) as baseline
                refId: A
                sql:
                    columns:
                        - parameters: []
                          type: function
                    groupBy:
                        - property:
                            type: string
                          type: groupBy
                    limit: 50
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          keepFiringFor: 5m
          annotations: {}
          labels:
            alert_type: ""
            team: operations
          isPaused: false
          notification_settings:
            receiver: Honeypot Alerts
